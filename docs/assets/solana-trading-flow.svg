<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">T3MP3ST Solana trading-security flow</title>
  <desc id="desc">Animated flow from read-only RPC evidence through decoding, simulation, receipt gates, and Phoenix/Vulcan UI review.</desc>
  <defs>
    <linearGradient id="solana" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14f195"/>
      <stop offset="52%" stop-color="#2dd4ff"/>
      <stop offset="100%" stop-color="#9945ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #080a0f; }
      .panel { fill: #11151d; stroke: #283140; stroke-width: 1.2; }
      .label { fill: #f5f7fb; font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #9aa6b8; font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .muted { fill: #64748b; font: 500 11px Inter, ui-sans-serif, system-ui, sans-serif; }
      .pipe { fill: none; stroke: url(#solana); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 18 16; animation: dash 2.8s linear infinite; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation-delay: .35s; }
      .pulse3 { animation-delay: .7s; }
      .pulse4 { animation-delay: 1.05s; }
      .cursor { fill: #14f195; animation: blink 1.1s steps(2, start) infinite; }
      .scan { fill: url(#solana); opacity: .14; animation: scan 4.2s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -68; } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); filter: none; opacity: .84; }
        45% { transform: scale(1.035); filter: url(#glow); opacity: 1; }
      }
      @keyframes blink { 0%, 45% { opacity: 1; } 46%, 100% { opacity: .08; } }
      @keyframes scan {
        0% { transform: translateX(-760px); }
        54%, 100% { transform: translateX(980px); }
      }
    </style>
  </defs>
  <rect class="bg" width="960" height="320" rx="18"/>
  <rect class="scan" x="0" y="0" width="160" height="320"/>
  <text x="36" y="42" class="label">T3MP3ST Solana Trading Security</text>
  <text x="36" y="64" class="small">Read-only evidence, decode, simulate, receipt-gate, then review in Phoenix/Vulcan UI.</text>

  <path class="pipe" d="M154 158 H807"/>

  <g class="pulse">
    <rect class="panel" x="36" y="100" width="170" height="118" rx="10"/>
    <text x="58" y="134" class="label">RPC Evidence</text>
    <text x="58" y="158" class="small">cluster, slot, accounts</text>
    <text x="58" y="178" class="small">token program variant</text>
    <text x="58" y="198" class="muted">read-only by default</text>
  </g>

  <g class="pulse pulse2">
    <rect class="panel" x="262" y="100" width="170" height="118" rx="10"/>
    <text x="284" y="134" class="label">Decode</text>
    <text x="284" y="158" class="small">signers, writables</text>
    <text x="284" y="178" class="small">value and authority</text>
    <text x="284" y="198" class="muted">Token-2022 aware</text>
  </g>

  <g class="pulse pulse3">
    <rect class="panel" x="488" y="100" width="170" height="118" rx="10"/>
    <text x="510" y="134" class="label">Simulate</text>
    <text x="510" y="158" class="small">dry-run first</text>
    <text x="510" y="178" class="small">fees, deltas, logs</text>
    <text x="510" y="198" class="muted">no blind signing</text>
  </g>

  <g class="pulse pulse4">
    <rect class="panel" x="714" y="100" width="190" height="118" rx="10"/>
    <text x="736" y="134" class="label">Receipt Gate</text>
    <text x="736" y="158" class="small">wallet prompt review</text>
    <text x="736" y="178" class="small">Phoenix/Vulcan console</text>
    <text x="736" y="198" class="muted">human approval required</text>
  </g>

  <rect x="36" y="252" width="888" height="34" rx="8" fill="#0f141c" stroke="#283140"/>
  <text x="56" y="274" class="small">LIVE MODE WARNING: no private keys in prompts or logs; signing, swaps, transfers, votes, mints, burns, and authority changes require explicit receipts.</text>
  <rect class="cursor" x="900" y="261" width="8" height="18" rx="2"/>
</svg>
